name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test and checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.23.0 ./...

      - name: Secret scan
        run: go run github.com/zricethezav/gitleaks/v8@v8.28.0 detect --source . --no-git --verbose

      - name: Cross-build smoke
        run: ./scripts/build.sh ci

  windows:
    name: Windows test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build Windows x64
        shell: pwsh
        run: |
          go build `
            -ldflags "-s -w -X github.com/Stonefish-Labs/opencode-agent/internal/cli.Version=ci" `
            -o "$env:RUNNER_TEMP\opencode-agent-windows-amd64.exe" `
            ./cmd/opencode-agent
